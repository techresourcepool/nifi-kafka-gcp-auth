name: Build & Release NAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
      release_notes:
        description: "Release notes / changelog"
        required: false
        default: ""

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build NAR with Maven
                run: |
                          chmod +x mvnw
                                    ./mvnw package -DskipTests --no-transfer-progress

      - name: Locate NAR file
        id: find_nar
        run: |
          NAR_PATH=$(find . -name "*.nar" | head -n 1)
          echo "NAR file found: $NAR_PATH"
          echo "nar_path=$NAR_PATH" >> "$GITHUB_OUTPUT"
          echo "nar_name=$(basename $NAR_PATH)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload NAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "NiFi Kafka GCP Auth ${{ github.event.inputs.version }}"
          body: |
            ## NiFi Kafka GCP Auth ${{ github.event.inputs.version }}

            Apache NiFi extension that provides GCP OAuth2 access tokens for Kafka OAUTHBEARER authentication.

            ### Installation
            Copy the `.nar` file to the `$NIFI_HOME/extensions/` directory and restart NiFi.

            ${{ github.event.inputs.release_notes }}
          files: ${{ steps.find_nar.outputs.nar_path }}
          draft: false
          prerelease: false
